name: cu-mac-watch
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min (GH may queue with delay during high load)
  workflow_dispatch:        # manual trigger
permissions:
  contents: write           # to commit state.json updates

concurrency:
  group: cu-mac-watch
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-chromium-v1
      - name: Install chromium (only if cache missed)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium
      - name: Scrape
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scrape.py
      - name: Upload debug HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug-*.html
          retention-days: 3
          if-no-files-found: ignore
      - name: Commit state
        run: |
          git config user.name 'cu-mac-watch[bot]'
          git config user.email 'cu-mac-watch[bot]@users.noreply.github.com'
          git add state.json
          if git diff --cached --quiet; then
            echo "no state change"
          else
            git commit -m "state: $(date -uIs)"
            git push
          fi
